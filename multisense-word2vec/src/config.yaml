training:
  window_size: 2
  embedding_dim: 16
  num_epochs: 30
  num_workers: 4

  # Gensim Word2Vec parameters
  min_count: 5
  sg: 1                     # 1 = Skip-gram, 0 = CBOW
  negative: 10              # More negatives for larger vocab
  sample: 0.01             # Subsampling threshold
  alpha: 0.025              # Initial learning rate
  min_alpha: 0.0001         # Final learning rate
  seed: 42